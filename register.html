<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBox | Secure Registration</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary-green: #22c55e; --dark-bg: #030704; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark-bg); color: white; min-height: 100vh; overflow-x: hidden; }

        .bg-cinema {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, var(--dark-bg) 30%, rgba(0,0,0,0.4) 100%), 
                        url('https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=2059&auto=format&fit=crop');
            background-size: cover; z-index: -1; animation: slowZoom 30s infinite alternate ease-in-out;
        }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }

        .glass-card {
            background: rgba(10, 15, 10, 0.75);
            backdrop-filter: blur(35px);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 2.5rem;
            width: 92%; max-width: 420px;
        }

        /* Fixed Email/Input Visibility */
        .input-wrapper { position: relative; width: 100%; }
        .input-wrapper input {
            width: 100% !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding: 1.2rem 1rem 1.2rem 3.5rem !important;
            border-radius: 1.2rem !important;
            color: white !important;
            font-size: 1rem !important;
            transition: all 0.3s ease;
        }
        .input-wrapper input:focus { border-color: var(--primary-green) !important; box-shadow: 0 0 20px rgba(34, 197, 94, 0.15); }
        .input-wrapper i { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--primary-green); font-size: 1.1rem; }

        .step { display: none; }
        .step.active { display: block; animation: slideIn 0.5s ease forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* Cookie Banner */
        #cookie-banner {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: rgba(20, 25, 20, 0.95);
            border: 1px solid var(--primary-green); padding: 15px;
            border-radius: 1.5rem; display: flex; align-items: center; justify-content: space-between;
            z-index: 1000; backdrop-filter: blur(10px); display: none;
        }

        .otp-box { width: 45px; height: 55px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); text-align: center; font-size: 1.5rem; font-weight: 800; color: var(--primary-green); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="bg-cinema"></div>

    <div id="cookie-banner">
        <p class="text-[10px] text-zinc-300 pr-4">We use cookies to enhance your cinema experience. <a href="#" class="underline">Learn more</a></p>
        <button onclick="acceptCookies()" class="bg-green-600 text-black text-[10px] font-bold px-4 py-2 rounded-lg">ACCEPT</button>
    </div>

    <div class="glass-card p-8 shadow-2xl relative">
        <div class="w-full h-1.5 bg-zinc-800 rounded-full mb-8 overflow-hidden">
            <div id="progress-bar" class="h-full bg-green-500 transition-all duration-500" style="width: 33%"></div>
        </div>

        <div id="step1" class="step active">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black tracking-tighter">CBOX JOIN</h1>
                <p class="text-zinc-400 text-xs uppercase tracking-widest mt-1">Create your profile</p>
            </div>
            
            <form id="regForm" class="space-y-4">
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullname" placeholder="Full Name" required>
                </div>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                
                <div class="flex justify-between items-center px-2">
                    <a href="forgot.html" class="text-[10px] text-zinc-500 hover:text-green-500 uppercase font-bold">Forgot Password?</a>
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-4 rounded-2xl transition shadow-lg shadow-green-900/20 uppercase text-xs tracking-widest">
                    GET OTP CODE
                </button>
            </form>
        </div>

        <div id="step2" class="step">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-green-600/10 border border-green-500/30 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-paper-plane text-green-500"></i>
                </div>
                <h2 class="text-2xl font-bold">Verify</h2>
                <p class="text-zinc-400 text-xs mt-1">We've sent a 6-digit code to your email.</p>
            </div>
            
            <div class="flex justify-between mb-8" id="otp-inputs">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
            </div>

            <button onclick="verifyOTP()" class="w-full bg-green-600 text-black font-black py-4 rounded-2xl uppercase text-xs">
                CONFIRM REGISTRATION
            </button>
        </div>

        <div id="step3" class="step text-center py-6">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_40px_rgba(34,197,94,0.4)]">
                <i class="fas fa-check text-black text-4xl"></i>
            </div>
            <h2 class="text-3xl font-black mb-2">CONGRATULATIONS!</h2>
            <p class="text-zinc-400 text-sm mb-8 px-4">Account yanu yakonzedwa mwaluso kwambiri. Takulandirani ku CBox Cinema.</p>
            <button onclick="window.location.href='index.php'" class="w-full bg-white text-black font-black py-4 rounded-2xl">GO TO DASHBOARD</button>
        </div>

        <p id="login-link" class="text-center mt-8 text-[10px] text-zinc-500 uppercase font-bold">
            Already a member? <a href="login.html" class="text-green-500">Log In</a>
        </p>
    </div>

    <script>
        // Cookie Logic
        if(!localStorage.getItem('cookiesAccepted')) {
            document.getElementById('cookie-banner').style.display = 'flex';
        }
        function acceptCookies() {
            localStorage.setItem('cookiesAccepted', 'true');
            document.getElementById('cookie-banner').style.fadeOut();
        }

        // Multi-Step Logic
        const form = document.getElementById('regForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            // Call your server to send Brevo Email
            const response = await fetch('/api/send-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email })
            });

            if(response.ok) {
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                document.getElementById('progress-bar').style.width = '66%';
            }
        });

        async function verifyOTP() {
            // Logic to check OTP against server
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('login-link').style.display = 'none';
        }

        // Auto-focus OTP inputs
        const inputs = document.querySelectorAll('.otp-box');
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if(e.target.value.length === 1 && index < 5) inputs[index + 1].focus();
            });
        });
    </script>
</body>
</html>
