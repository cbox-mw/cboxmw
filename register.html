<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBox | Register App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary-green: #22c55e; --bg-dark: #050505; --error-red: #ff3333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            margin: 0; 
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- CUSTOM RED ALERT CSS --- */
        #customAlert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(255, 0, 0, 0.15);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 51, 51, 0.4);
            padding: 16px; border-radius: 12px; z-index: 9999;
            display: flex; align-items: center; gap: 12px;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #customAlert.show { top: 20px; }
        .alert-icon { color: var(--error-red); font-size: 1.2rem; }
        .alert-msg { color: #ffcccc; font-size: 0.85rem; font-weight: 600; flex: 1; }

        .app-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at top right, rgba(34, 197, 94, 0.1), transparent 50%), 
                        radial-gradient(circle at bottom left, rgba(0, 0, 0, 1), transparent 50%),
                        var(--bg-dark);
            z-index: -1;
        }

        .step-circle {
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800; background: #111; color: #555; border: 2px solid #222; transition: all 0.4s ease;
        }
        .step-circle.active { background: rgba(34, 197, 94, 0.1); color: var(--primary-green); border-color: var(--primary-green); box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .step-circle.completed { background: var(--primary-green); color: black; border-color: var(--primary-green); }
        
        .step-line { flex: 1; height: 2px; background: #222; transition: all 0.4s ease; margin: 0 8px; border-radius: 2px; }
        .step-line.active { background: var(--primary-green); }

        .input-group { position: relative; margin-bottom: 1.2rem; width: 100%; }
        .app-input {
            width: 100%;
            background: #0f0f0f;
            border: 1px solid #222;
            padding: 1.25rem 1rem 1.25rem 3.5rem; 
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .app-input:focus { border-color: var(--primary-green); background: #141f16; }
        .app-icon { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: #666; font-size: 1.2rem; transition: 0.3s; }
        .input-group:focus-within .app-icon { color: var(--primary-green); }

        .screen { display: none; animation: slideInApp 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }
        .screen.active { display: block; }
        @keyframes slideInApp { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

        .otp-grid { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 2rem; }
        .otp-box {
            width: 100%; aspect-ratio: 1; border-radius: 12px; background: #0f0f0f; border: 1px solid #222;
            text-align: center; font-size: 1.8rem; font-weight: 800; color: var(--primary-green); transition: 0.3s;
        }
        .otp-box:focus { outline: none; border-color: var(--primary-green); background: #141f16; }

        .app-btn {
            width: 100%; background: var(--primary-green); color: black; font-weight: 800; padding: 1.25rem;
            border-radius: 1rem; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center; border: none; transition: 0.2s;
        }
        .app-btn:active { transform: scale(0.97); }
        .btn-loading { color: transparent !important; position: relative; pointer-events: none; }
        .btn-loading::after {
            content: ""; position: absolute; width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.3);
            border-top-color: black; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased">

    <div id="customAlert">
        <i class="fas fa-exclamation-circle alert-icon"></i>
        <span class="alert-msg" id="alertMsg">Zalakwika: Failed to fetch</span>
    </div>

    <div class="app-bg"></div>

    <div class="w-full max-w-md mx-auto min-h-screen flex flex-col px-6 py-10 relative">
        
        <div class="text-center mb-8 pt-4">
            <h1 class="text-2xl font-black tracking-tighter text-white">CBOX</h1>
        </div>

        <div class="flex items-center justify-between mb-10">
            <div class="flex flex-col items-center z-10">
                <div class="step-circle active" id="step1-circle">1</div>
                <span class="text-[10px] mt-2 font-bold uppercase tracking-widest text-green-500" id="step1-label">Details</span>
            </div>
            
            <div class="step-line" id="line1"></div>
            
            <div class="flex flex-col items-center z-10">
                <div class="step-circle" id="step2-circle">2</div>
                <span class="text-[10px] mt-2 font-bold uppercase tracking-widest text-zinc-600" id="step2-label">Code</span>
            </div>
            
            <div class="step-line" id="line2"></div>
            
            <div class="flex flex-col items-center z-10">
                <div class="step-circle" id="step3-circle">3</div>
                <span class="text-[10px] mt-2 font-bold uppercase tracking-widest text-zinc-600" id="step3-label">Finish</span>
            </div>
        </div>

        <div class="flex-grow flex flex-col justify-center">

            <div id="screen-details" class="screen active">
                <h2 class="text-2xl font-black mb-1">Create Account</h2>
                <p class="text-zinc-400 text-sm mb-8">Enter your details to get started.</p>

                <form id="detailsForm" class="space-y-2">
                    <div class="input-group">
                        <i class="fas fa-user app-icon"></i>
                        <input type="text" id="username" class="app-input" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope app-icon"></i>
                        <input type="email" id="userEmail" class="app-input" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock app-icon"></i>
                        <input type="password" id="userPassword" class="app-input" placeholder="Create Password" required>
                    </div>

                    <div class="pt-4">
                        <button type="submit" id="btnDetails" class="app-btn">
                            Get OTP Code
                        </button>
                    </div>
                </form>
            </div>

            <div id="screen-code" class="screen">
                <h2 class="text-2xl font-black mb-1">Enter Code</h2>
                <p class="text-zinc-400 text-sm mb-8">We sent a 6-digit code to <span id="displayEmail" class="text-white font-bold"></span></p>

                <div class="otp-grid" id="otpContainer">
                    <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
                    <input type="text" maxlength="1" class="otp-box" inputmode="numeric">
                </div>

                <button onclick="submitOTP()" id="btnCode" class="app-btn">
                    Verify Code
                </button>
                
                <div class="text-center mt-6">
                    <button id="resendBtn" class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest hover:text-white">Resend Code</button>
                </div>
            </div>

            <div id="screen-finish" class="screen text-center py-8">
                <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_50px_rgba(34,197,94,0.3)]">
                    <i class="fas fa-check text-black text-5xl"></i>
                </div>
                <h2 class="text-3xl font-black mb-2 text-white">CONGRATS!</h2>
                <p class="text-zinc-400 text-sm mb-10 leading-relaxed">Your account has been successfully verified. Welcome to CBox.</p>
                
                <p class="text-[10px] text-zinc-500 animate-pulse">Redirecting to Dashboard...</p>
            </div>

        </div>

        <div id="footer-login" class="text-center mt-auto pt-8 pb-4">
            <p class="text-[11px] text-zinc-500 font-bold uppercase tracking-widest">
                Already have an account? <a href="login.html" class="text-green-500 ml-1">Log In</a>
            </p>
        </div>

    </div>

    <script>
        // 1. SUPABASE INITIALIZATION
        // Onetsetsani kuti mwayika ma keys anu enieni pano
        const SUPABASE_URL = 'https://ahwxlcmgwkjaagkxsvip.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFod3hsY21nd2tqYWFna3hzdmlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTE0NzMsImV4cCI6MjA5MjQyNzQ3M30.G9ayQBkn00F4fhrqKMsdYigDscN-B2-7zkyvj5Xbb8o';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- HELPER: CUSTOM RED ALERT ---
        function showError(message) {
            const alertBox = document.getElementById('customAlert');
            const alertMsg = document.getElementById('alertMsg');
            alertMsg.innerText = message;
            alertBox.classList.add('show');
            
            // Itseokha pakatha 4 seconds
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 4000);
        }

        const formDetails = document.getElementById('detailsForm');
        
        // --- STEP 1: SEND OTP ---
        formDetails.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnDetails');
            const email = document.getElementById('userEmail').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('userPassword').value;

            btn.classList.add('btn-loading');

            try {
                const { data, error } = await _supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { username: username } }
                });

                btn.classList.remove('btn-loading');

                if (error) {
                    showError("Zalakwika: " + error.message);
                    return;
                }

                // Success
                document.getElementById('displayEmail').innerText = email;
                document.getElementById('screen-details').classList.remove('active');
                document.getElementById('screen-code').classList.add('active');
                document.getElementById('footer-login').style.display = 'none';

                const c1 = document.getElementById('step1-circle');
                c1.classList.remove('active');
                c1.classList.add('completed');
                c1.innerHTML = '<i class="fas fa-check"></i>';
                document.getElementById('step1-label').classList.replace('text-green-500', 'text-zinc-600');
                document.getElementById('line1').classList.add('active');
                document.getElementById('step2-circle').classList.add('active');
                document.getElementById('step2-label').classList.replace('text-zinc-600', 'text-green-500');

                document.querySelectorAll('.otp-box')[0].focus();

            } catch (err) {
                btn.classList.remove('btn-loading');
                showError("Zalakwika: Check netiweki kapena Supabase Keys");
            }
        });

        // --- STEP 2: VERIFY OTP ---
        async function submitOTP() {
            const btn = document.getElementById('btnCode');
            const email = document.getElementById('userEmail').value;
            const otpInputs = document.querySelectorAll('.otp-box');
            let otpToken = "";
            otpInputs.forEach(input => otpToken += input.value);

            if(otpToken.length < 6) {
                showError("Chonde lembani manambala onse 6");
                return;
            }

            btn.classList.add('btn-loading');

            try {
                const { data, error } = await _supabase.auth.verifyOtp({
                    email: email,
                    token: otpToken,
                    type: 'signup'
                });

                btn.classList.remove('btn-loading');

                if (error) {
                    showError("Code yolakwika kapena yathera nthawi");
                    return;
                }

                // SUCCESS FLOW
                document.getElementById('screen-code').classList.remove('active');
                document.getElementById('screen-finish').classList.add('active');

                const c2 = document.getElementById('step2-circle');
                c2.classList.remove('active');
                c2.classList.add('completed');
                c2.innerHTML = '<i class="fas fa-check"></i>';
                document.getElementById('step2-label').classList.replace('text-green-500', 'text-zinc-600');
                document.getElementById('line2').classList.add('active');
                
                const c3 = document.getElementById('step3-circle');
                c3.classList.add('completed');
                c3.innerHTML = '<i class="fas fa-check"></i>';
                document.getElementById('step3-label').classList.replace('text-zinc-600', 'text-green-500');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);

            } catch (err) {
                btn.classList.remove('btn-loading');
                showError("Zalakwika poyesa kulowetsa code");
            }
        }

        // OTP Input Focus Management
        const otpInputs = document.querySelectorAll('.otp-box');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                input.value = input.value.replace(/[^0-9]/g, '');
                if (input.value !== '' && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && input.value === '' && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });
    </script>
</body>
</html>
