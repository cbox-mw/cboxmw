<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBox | Register Professional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary-green: #22c55e; --dark-bg: #030704; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--dark-bg); 
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-x: hidden;
        }

        /* Cinematic Background */
        .bg-cinema {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, var(--dark-bg) 30%, rgba(0,0,0,0.4) 100%), 
                        url('https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=2059&auto=format&fit=crop');
            background-size: cover; background-position: center;
            z-index: -1; animation: slowZoom 30s infinite alternate ease-in-out;
        }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.15); } }

        .glass-card {
            background: rgba(10, 15, 10, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(34, 197, 94, 0.15);
            width: 100%;
            max-width: 420px;
            border-radius: 2.5rem;
            padding: 2.5rem;
            position: relative;
        }

        /* Progress Bar */
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 2rem; overflow: hidden; }
        #progress-bar { width: 33%; height: 100%; background: var(--primary-green); transition: 0.5s ease; box-shadow: 0 0 10px var(--primary-green); }

        /* Input Styling Fixed for Email Visibility */
        .input-group input {
            width: 100% !important;
            display: block !important;
            background: rgba(255,255,255,0.03) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            padding: 1rem 1rem 1rem 3rem !important;
            border-radius: 1.2rem !important;
            color: white !important;
            font-size: 0.95rem !important;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--primary-green) !important; background: rgba(34, 197, 94, 0.05) !important; outline: none; }

        /* Loading Spinner */
        .btn-loading { pointer-events: none; color: transparent !important; }
        .btn-loading::after {
            content: ""; position: absolute; width: 22px; height: 22px;
            top: 50%; left: 50%; margin: -11px 0 0 -11px;
            border: 3px solid rgba(0,0,0,0.1); border-top-color: #000;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* OTP Inputs */
        .otp-input { width: 45px; height: 55px; text-align: center; font-size: 1.5rem; font-weight: 800; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin: 0 4px; color: var(--primary-green); }
    </style>
</head>
<body>

    <div class="bg-cinema"></div>

    <div class="glass-card shadow-2xl">
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="step1" class="step active text-center">
            <div class="mb-6">
                <h2 class="text-2xl font-extrabold text-white">Create Account</h2>
                <p class="text-zinc-400 text-sm">Step 1: Your details</p>
            </div>
            
            <form id="formStep1" class="space-y-4">
                <div class="input-group relative text-left">
                    <i class="fas fa-user absolute left-4 top-4 text-zinc-500"></i>
                    <input type="text" id="fullname" placeholder="Full Name" required>
                </div>
                <div class="input-group relative text-left">
                    <i class="fas fa-envelope absolute left-4 top-4 text-zinc-500"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group relative text-left">
                    <i class="fas fa-lock absolute left-4 top-4 text-zinc-500"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-4 rounded-2xl transition mt-4 flex items-center justify-center relative">
                    CONTINUE <i class="fas fa-arrow-right ml-2 text-xs"></i>
                </button>
            </form>
        </div>

        <div id="step2" class="step text-center">
            <div class="mb-6">
                <div class="w-16 h-16 bg-zinc-800 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-shield-alt text-green-500 text-2xl"></i>
                </div>
                <h2 class="text-2xl font-extrabold text-white">Verify Email</h2>
                <p class="text-zinc-400 text-xs mt-2 leading-relaxed">Enter the 6-digit code sent to your email.</p>
            </div>

            <div class="flex justify-center mb-6">
                <input type="text" maxlength="1" class="otp-input" placeholder="0">
                <input type="text" maxlength="1" class="otp-input" placeholder="0">
                <input type="text" maxlength="1" class="otp-input" placeholder="0">
                <input type="text" maxlength="1" class="otp-input" placeholder="0">
                <input type="text" maxlength="1" class="otp-input" placeholder="0">
                <input type="text" maxlength="1" class="otp-input" placeholder="0">
            </div>

            <button onclick="verifyCode()" id="verifyBtn" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-4 rounded-2xl relative">
                VERIFY & FINISH
            </button>
            <p class="mt-4 text-xs text-zinc-500">Didn't get code? <button class="text-green-500 font-bold">Resend</button></p>
        </div>

        <div id="step3" class="step text-center">
            <div class="py-8">
                <div class="w-20 h-20 bg-green-600/20 border-2 border-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-check text-green-500 text-4xl"></i>
                </div>
                <h2 class="text-3xl font-black text-white">CONGRATS!</h2>
                <p class="text-zinc-400 text-sm mt-3 px-4">Your cinema pass is ready. Welcome to the future of entertainment in Malawi.</p>
            </div>

            <button onclick="window.location.href='index.html'" class="w-full bg-white text-black font-black py-4 rounded-2xl shadow-xl hover:bg-zinc-200 transition">
                GET STARTED
            </button>
        </div>

        <div id="footer-link" class="mt-8 text-center">
            <p class="text-zinc-500 text-xs font-medium uppercase tracking-widest">
                Already registered? <a href="login.html" class="text-green-500 font-black ml-1">Log In</a>
            </p>
        </div>
    </div>

    <script>
        const progressBar = document.getElementById('progress-bar');
        const footerLink = document.getElementById('footer-link');

        // Handle Step 1 to Step 2
        document.getElementById('formStep1').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.classList.add('btn-loading');

            // Simulate server check
            setTimeout(() => {
                btn.classList.remove('btn-loading');
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                progressBar.style.width = '66%';
            }, 1500);
        });

        // Handle Step 2 to Step 3 (The Congratulations)
        function verifyCode() {
            const btn = document.getElementById('verifyBtn');
            btn.classList.add('btn-loading');

            // Simulate OTP Check
            setTimeout(() => {
                btn.classList.remove('btn-loading');
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.add('active');
                footerLink.style.display = 'none'; // Hide login link on success
                progressBar.style.width = '100%';
            }, 2000);
        }

        // OTP Input Focus Logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
        });
    </script>
</body>
</html>
